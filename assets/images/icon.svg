<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B5E20"/>
      <stop offset="100%" style="stop-color:#0D1F0D"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
  </defs>
  <!-- 背景圆形 -->
  <circle cx="128" cy="128" r="120" fill="url(#bg)" stroke="#2D6A4F" stroke-width="8"/>
  <!-- 树 -->
  <polygon points="128,30 80,130 100,130 60,200 196,200 156,130 176,130" fill="#2E7D32"/>
  <rect x="110" y="200" width="36" height="30" fill="#5D4037"/>
  <!-- 星星装饰 -->
  <text x="60" y="70" font-size="30" fill="#FFD700">✦</text>
  <text x="180" y="90" font-size="20" fill="#FFD700">✦</text>
  <text x="200" y="160" font-size="24" fill="#FFD700">✦</text>
  <!-- 发光效果 -->
  <circle cx="128" cy="120" r="40" fill="rgba(255,215,0,0.2)"/>
</svg>
