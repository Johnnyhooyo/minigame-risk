<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>探险解谜 - 神秘森林</title>
    <style>
        /* ==================== 色彩方案 ==================== */
        :root {
            /* 主色系 */
            --forest-green: #2D6A4F;
            --forest-green-light: #40916C;
            --magic-purple: #7B2CBF;
            --magic-purple-light: #9D4EDD;
            --gold: #FFD700;
            --gold-light: #FFE066;
            
            /* 背景色系 */
            --bg-darkest: #0D1F0D;
            --bg-dark: #1A3A1A;
            --bg-light: #2D5A2D;
            --card-bg: rgba(20, 40, 20, 0.95);
            
            /* 文字色系 */
            --text-primary: #FFFFFF;
            --text-secondary: #B8E0B8;
            --text-muted: #6B8E6B;
            --text-gold: #FFD700;
            
            /* 透明度 */
            --glass-bg: rgba(13, 31, 13, 0.85);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
            background: var(--bg-darkest);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 900px;
            position: relative;
            background: linear-gradient(180deg, var(--bg-darkest) 0%, var(--bg-dark) 50%, var(--bg-light) 100%);
            overflow: hidden;
            /* 多平台适配 */
            transform-origin: center center;
        }

        /* ==================== 游戏画布 ==================== */
        #game-canvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 8px;
            /* 写实木框边框 */
            box-shadow: 
                0 0 0 4px #5D4037,
                0 0 0 6px #3E2723,
                0 8px 30px rgba(0,0,0,0.6);
        }

        /* ==================== 顶部状态栏 ==================== */
        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            padding: 12px 16px;
            /* 透明渐变背景+森林元素 */
            background: linear-gradient(180deg, 
                rgba(13, 31, 13, 0.95) 0%, 
                rgba(45, 106, 79, 0.6) 50%,
                rgba(13, 31, 13, 0.3) 100%);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 215, 0, 0.15);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }

        .status-item .icon { 
            font-size: 20px;
            filter: drop-shadow(0 0 4px rgba(255, 215, 0, 0.5));
            animation: iconFloat 3s ease-in-out infinite;
        }
        
        .status-item .icon.leaf { animation-delay: 0s; }
        .status-item .icon.gem { animation-delay: 1s; }
        .status-item .icon.music { animation-delay: 2s; }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-2px) rotate(5deg); }
            75% { transform: translateY(2px) rotate(-5deg); }
        }
        
        .status-item .value { 
            color: var(--gold);
            font-family: 'SF Mono', monospace;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            transition: transform 0.2s;
        }
        
        .status-item .value.bump {
            animation: countBump 0.3s ease;
        }

        @keyframes countBump {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        #playerName {
            color: var(--text-secondary);
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { text-shadow: 0 0 5px rgba(184, 224, 184, 0.3); }
            50% { text-shadow: 0 0 15px rgba(184, 224, 184, 0.6); }
        }

        /* 退出按钮 */
        #exit-btn {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        #exit-btn:hover { 
            background: rgba(255, 215, 0, 0.15); 
            color: var(--gold);
            border-color: rgba(255, 215, 0, 0.3);
        }

        /* ==================== 虚拟摇杆 ==================== */
        #joystick-area {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 120px;
            height: 120px;
            /* 木质纹理边框 */
            background: 
                /* 木纹层 */
                radial-gradient(ellipse at 30% 30%, rgba(93, 64, 55, 0.8) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 60%, rgba(62, 39, 35, 0.9) 0%, transparent 40%),
                radial-gradient(ellipse at 50% 80%, rgba(93, 64, 55, 0.7) 0%, transparent 45%),
                /* 基底 */
                linear-gradient(135deg, #5D4037 0%, #3E2723 50%, #4E342E 100%);
            border: 4px solid #8D6E63;
            border-radius: 50%;
            z-index: 50;
            touch-action: none;
            box-shadow: 
                /* 外发光 */
                0 0 25px rgba(45, 106, 79, 0.5),
                /* 内阴影 */
                inset 0 0 25px rgba(0, 0, 0, 0.5),
                inset 0 0 50px rgba(0, 0, 0, 0.3),
                /* 底部高光 */
                0 5px 15px rgba(0, 0, 0, 0.5);
            animation: joystickPulse 2s ease-in-out infinite;
            /* 木纹纹理 */
            background-size: 100% 100%;
        }

        /* 木纹装饰线 */
        #joystick-area::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 50%;
            pointer-events: none;
        }

        /* 魔法符文装饰 */
        #joystick-area::after {
            content: '᛭ ✦ ᛭';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            color: rgba(255, 215, 0, 0.15);
            letter-spacing: 4px;
            pointer-events: none;
        }

        @keyframes joystickPulse {
            0%, 100% { 
                box-shadow: 
                    0 0 25px rgba(45, 106, 79, 0.5),
                    inset 0 0 25px rgba(0, 0, 0, 0.5),
                    inset 0 0 50px rgba(0, 0, 0, 0.3),
                    0 5px 15px rgba(0, 0, 0, 0.5);
            }
            50% { 
                box-shadow: 
                    0 0 35px rgba(255, 215, 0, 0.4),
                    0 0 50px rgba(123, 44, 191, 0.3),
                    inset 0 0 25px rgba(0, 0, 0, 0.5),
                    inset 0 0 50px rgba(0, 0, 0, 0.3),
                    0 5px 15px rgba(0, 0, 0, 0.5);
            }
        }

        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            /* 魔法符文风格 + 木质中心 */
            background: 
                radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.2) 0%, transparent 50%),
                radial-gradient(circle, #40916C 0%, #2D6A4F 60%, #1B5E20 100%);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 
                /* 魔法光晕 */
                0 0 20px rgba(255, 215, 0, 0.5),
                0 0 40px rgba(123, 44, 191, 0.3),
                /* 阴影 */
                0 4px 15px rgba(0, 0, 0, 0.5),
                inset 0 -3px 10px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--gold);
            /* 符文边框 */
            border: 2px solid rgba(255, 215, 0, 0.4);
        }

        /* 摇杆中心符文 */
        #joystick-knob::before {
            content: '✧';
            text-shadow: 0 0 10px var(--gold), 0 0 20px rgba(255, 215, 0, 0.5);
            font-size: 18px;
            animation: runeGlow 2s ease-in-out infinite;
        }

        @keyframes runeGlow {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        #joystick-knob::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            right: 4px;
            bottom: 4px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 50%;
        }

        #joystick-knob:active, #joystick-knob.active {
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 
                0 0 50px rgba(255, 215, 0, 0.7),
                0 0 80px rgba(123, 44, 191, 0.5),
                0 0 100px rgba(45, 106, 79, 0.4),
                0 4px 15px rgba(0, 0, 0, 0.5);
        }

        /* ==================== 背包按钮 ==================== */
        #inventory-btn {
            position: absolute;
            bottom: 40px;
            right: 20px;
            width: 56px;
            height: 56px;
            /* 森林绿渐变 */
            background: linear-gradient(135deg, #40916C 0%, #2D6A4F 100%);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            color: #fff;
            cursor: pointer;
            z-index: 50;
            border: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 4px 20px rgba(45, 106, 79, 0.5);
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }

        #inventory-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(255, 215, 0, 0.4);
            border-color: var(--gold);
        }

        #inventory-btn:active {
            transform: scale(0.95);
        }

        /* ==================== 对话框 ==================== */
        #dialogue-box {
            position: absolute;
            bottom: 120px;
            left: 16px;
            right: 16px;
            /* 森林主题深绿渐变 */
            background: linear-gradient(180deg, rgba(20, 50, 20, 0.98) 0%, rgba(10, 30, 10, 0.98) 100%);
            border-radius: 16px;
            padding: 20px;
            color: var(--text-primary);
            font-size: 15px;
            display: none;
            z-index: 80;
            border: 2px solid rgba(255, 215, 0, 0.25);
            box-shadow: 
                0 -10px 40px rgba(0, 0, 0, 0.5), 
                0 0 30px rgba(45, 106, 79, 0.3),
                inset 0 1px 0 rgba(255, 215, 0, 0.1);
            /* 滑入动画 */
            animation: dialogueSlideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes dialogueSlideIn {
            from { 
                transform: translateY(30px) scale(0.95); 
                opacity: 0; 
            }
            to { 
                transform: translateY(0) scale(1); 
                opacity: 1; 
            }
        }

        /* 对话框顶部装饰 */
        #dialogue-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20px;
            right: 20px;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255, 215, 0, 0.5) 50%, 
                transparent 100%);
        }

        #dialogue-box .npc-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--gold) 0%, #FFA500 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin-bottom: 12px;
            border: 2px solid var(--gold);
            box-shadow: 
                0 0 20px rgba(255, 215, 0, 0.5),
                inset 0 -3px 10px rgba(0, 0, 0, 0.2);
            float: left;
            margin-right: 12px;
            animation: avatarPulse 2s ease-in-out infinite;
        }

        @keyframes avatarPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.5), inset 0 -3px 10px rgba(0, 0, 0, 0.2); }
            50% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.7), inset 0 -3px 10px rgba(0, 0, 0, 0.2); }
        }

        #dialogue-box .npc-name {
            color: var(--gold);
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            overflow: hidden;
            clear: both;
        }

        #dialogue-box .dialogue-text {
            line-height: 1.7;
            margin-bottom: 12px;
            min-height: 44px;
            color: var(--text-primary);
            /* 打字机光标 */
            .typewriter-cursor {
                display: inline-block;
                width: 2px;
                height: 1em;
                background: var(--gold);
                margin-left: 2px;
                animation: cursorBlink 0.8s infinite;
                vertical-align: text-bottom;
            }
        }

        @keyframes cursorBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        #dialogue-box .continue {
            text-align: right;
            color: var(--text-muted);
            font-size: 12px;
            animation: pulse 1s infinite;
        }

        #dialogue-box .continue::before {
            content: '▸ ';
            color: var(--gold);
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* ==================== 背包界面 ==================== */
        #inventory-modal {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #inventory-modal.show { display: flex; }

        #inventory-content {
            /* 木质边框 + 森林主题 */
            background: 
                /* 木纹层 */
                linear-gradient(135deg, rgba(93, 64, 55, 0.3) 0%, transparent 50%),
                linear-gradient(225deg, rgba(93, 64, 55, 0.3) 0%, transparent 50%),
                /* 基底 */
                linear-gradient(135deg, #1A3A1A 0%, #0D1F0D 100%);
            border-radius: 20px;
            padding: 24px;
            width: 85%;
            max-width: 340px;
            border: 3px solid rgba(139, 90, 43, 0.6);
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.6),
                0 0 40px rgba(45, 106, 79, 0.3),
                inset 0 1px 0 rgba(255, 215, 0, 0.1),
                inset 0 0 30px rgba(0, 0, 0, 0.3);
            /* 木框装饰 */
            position: relative;
        }

        /* 木框角落装饰 */
        #inventory-content::before,
        #inventory-content::after {
            content: '❖';
            position: absolute;
            font-size: 16px;
            color: rgba(255, 215, 0, 0.4);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        #inventory-content::before {
            top: 8px;
            left: 8px;
        }

        #inventory-content::after {
            top: 8px;
            right: 8px;
        }

        #inventory-content h3 {
            color: var(--gold);
            text-align: center;
            font-size: 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        #inventory-content h3::before,
        #inventory-content h3::after {
            content: '✦';
            font-size: 12px;
            opacity: 0.7;
        }

        .inventory-slots {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .inv-slot {
            aspect-ratio: 1;
            background: 
                linear-gradient(135deg, rgba(0, 0, 0, 0.4) 0%, rgba(0, 0, 0, 0.2) 100%);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        /* 格子内部高光 */
        .inv-slot::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.05) 0%, transparent 100%);
            pointer-events: none;
        }

        .inv-slot.has-item {
            background: 
                radial-gradient(circle at center, rgba(255, 215, 0, 0.15) 0%, rgba(0, 0, 0, 0.3) 100%);
            border: 2px solid var(--gold);
            animation: itemShine 2s infinite;
        }

        /* 物品闪光效果 */
        @keyframes itemShine {
            0%, 100% { 
                box-shadow: 
                    0 0 15px rgba(255, 215, 0, 0.4),
                    inset 0 0 10px rgba(255, 215, 0, 0.1);
            }
            50% { 
                box-shadow: 
                    0 0 25px rgba(255, 215, 0, 0.6),
                    0 0 40px rgba(255, 215, 0, 0.3),
                    inset 0 0 15px rgba(255, 215, 0, 0.2);
            }
        }

        /* 物品获得时的动画 */
        .inv-slot.item-added {
            animation: itemAdded 0.5s ease-out;
        }

        @keyframes itemAdded {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        #close-inv {
            display: block;
            margin: 24px auto 0;
            background: linear-gradient(135deg, #40916C 0%, #2D6A4F 100%);
            color: #fff;
            border: 2px solid rgba(255, 215, 0, 0.3);
            padding: 12px 32px;
            border-radius: 24px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(45, 106, 79, 0.4);
        }

        #close-inv:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.4);
            border-color: var(--gold);
        }

        /* ==================== 提示 ==================== */
        #tip {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(13, 31, 13, 0.95);
            color: var(--gold);
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            display: none;
            z-index: 150;
            text-align: center;
            border: 2px solid var(--gold);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            animation: tipPop 0.3s;
        }

        @keyframes tipPop {
            from { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        /* ==================== 通关画面 ==================== */
        #victory-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, rgba(26, 58, 26, 0.98) 0%, rgba(13, 31, 13, 0.98) 100%);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 300;
            animation: victoryFade 0.5s;
        }

        @keyframes victoryFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #victory-screen.show { display: flex; }

        #victory-screen .trophy {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 1s infinite;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.5));
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        #victory-screen h1 {
            color: var(--gold);
            font-size: 28px;
            margin-bottom: 12px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        #victory-screen .subtitle {
            color: var(--text-secondary);
            font-size: 16px;
            margin-bottom: 40px;
        }

        #victory-screen .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
        }

        #victory-screen .stat {
            text-align: center;
        }

        #victory-screen .stat-value {
            font-size: 32px;
            color: var(--gold);
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        #victory-screen .stat-label {
            font-size: 12px;
            color: var(--text-muted);
        }

        #victory-screen button {
            background: linear-gradient(135deg, #40916C 0%, #2D6A4F 100%);
            color: #fff;
            border: 2px solid rgba(255, 215, 0, 0.3);
            padding: 14px 48px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(45, 106, 79, 0.5);
            transition: all 0.2s;
        }

        #victory-screen button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.4);
            border-color: var(--gold);
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- 顶部状态栏 -->
        <div id="top-bar">
            <div class="status-item">
                <span class="icon leaf">🍃</span>
                <span id="playerName">冒险家</span>
            </div>
            <div class="status-item">
                <span class="icon gem">💎</span>
                <span class="value"><span id="fragmentCount">0</span>/3</span>
            </div>
            <div class="status-item" style="cursor: pointer;" onclick="toggleMute()">
                <span class="icon music" id="audioIcon">🔊</span>
            </div>
            <button id="exit-btn" onclick="exitGame()">退出</button>
        </div>
        
        <canvas id="game-canvas"></canvas>
        
        <!-- 虚拟摇杆 -->
        <div id="joystick-area">
            <div id="joystick-knob"></div>
        </div>
        
        <!-- 背包按钮 -->
        <div id="inventory-btn" onclick="showInventory()">✦</div>
        
        <!-- 对话框 -->
        <div id="dialogue-box">
            <div class="npc-avatar" id="npcAvatar">👴</div>
            <div class="npc-name" id="npcName"></div>
            <div class="dialogue-text" id="dialogueText"></div>
            <div class="continue">点击继续 ▾</div>
        </div>
        
        <!-- 背包弹窗 -->
        <div id="inventory-modal" onclick="hideInventory()">
            <div id="inventory-content" onclick="event.stopPropagation()">
                <h3>🎒 背包</h3>
                <div class="inventory-slots" id="invSlots">
                    <div class="inv-slot"></div>
                    <div class="inv-slot"></div>
                    <div class="inv-slot"></div>
                    <div class="inv-slot"></div>
                    <div class="inv-slot"></div>
                    <div class="inv-slot"></div>
                </div>
                <button id="close-inv" onclick="hideInventory()">关闭</button>
            </div>
        </div>
        
        <!-- 提示 -->
        <div id="tip"></div>
        
        <!-- 通关画面 -->
        <div id="victory-screen">
            <div class="trophy">🏆</div>
            <h1>🎉 通关成功！</h1>
            <p class="subtitle">恭喜你离开了神秘森林！</p>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value">3</div>
                    <div class="stat-label">收集碎片</div>
                </div>
                <div class="stat">
                    <div class="stat-value">1</div>
                    <div class="stat-label">对话NPC</div>
                </div>
            </div>
            <button onclick="restartGame()">再玩一次</button>
        </div>
    </div>

    <script src="./assets/scripts/audio-system.js"></script>
    <script src="./assets/scripts/performance.js"></script>
    <script src="./assets/scripts/platform-adapter.js"></script>
    <script src="./assets/scripts/level1-game.js"></script>
    <script>
        // ========== T3.1 UI增强: 打字机效果 ==========
        let typewriterTimer = null;
        let typewriterSpeed = 30; // 毫秒/字符
        
        function typewriterEffect(element, text, callback) {
            // 清除之前的定时器
            if (typewriterTimer) {
                clearInterval(typewriterTimer);
            }
            
            element.innerHTML = '';
            let index = 0;
            
            // 创建光标
            const cursor = document.createElement('span');
            cursor.className = 'typewriter-cursor';
            
            typewriterTimer = setInterval(() => {
                if (index < text.length) {
                    element.textContent = text.substring(0, index + 1);
                    element.appendChild(cursor);
                    index++;
                } else {
                    clearInterval(typewriterTimer);
                    typewriterTimer = null;
                    if (callback) callback();
                }
            }, typewriterSpeed);
        }
        
        // 跳过打字机效果
        function skipTypewriter(element, fullText) {
            if (typewriterTimer) {
                clearInterval(typewriterTimer);
                typewriterTimer = null;
            }
            element.textContent = fullText;
        }
        
        // ========== T3.4 多平台适配 ==========
        document.addEventListener('DOMContentLoaded', async () => {
            // 初始化平台适配
            const adapter = await initPlatformAdapter();
            const info = adapter.getAdapterInfo();
            console.log('Platform Adapter Info:', info);
            
            // 根据平台调整UI
            if (info.platform.platform === 'pc') {
                // PC模式：启用鼠标操作提示
                document.body.style.cursor = 'default';
            }
            
            // 初始化音频系统
            initAudio();
            
            // 点击按钮时播放音效
            const buttons = document.querySelectorAll('button');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    playClick();
                });
            });
            
            // 背包按钮点击
            const invBtn = document.getElementById('inventory-btn');
            if (invBtn) {
                invBtn.addEventListener('click', () => {
                    playClick();
                });
            }
            
            // 对话框点击继续
            const dialogueBox = document.getElementById('dialogue-box');
            if (dialogueBox) {
                dialogueBox.addEventListener('click', () => {
                    playDialogue();
                });
            }
            
            // 静音按钮
            window.toggleMute = function() {
                const muted = audioManager.toggleMute();
                const icon = document.getElementById('audioIcon');
                if (icon) {
                    icon.textContent = muted ? '🔇' : '🔊';
                }
            };
        });
        
        // 物品收集时播放音效
        window.showTip = function(text) {
            const tip = document.getElementById('tip');
            if (tip) {
                tip.textContent = text;
                tip.style.display = 'block';
                playPickup();
                setTimeout(() => {
                    tip.style.display = 'none';
                }, 2000);
            }
        };
        
        // 游戏胜利时播放音效
        window.showVictory = function() {
            playVictory();
        };
        
        // 对话显示时播放音效
        window.showDialogue = function(name, text, avatar) {
            const npcNameEl = document.getElementById('npcName');
            const dialogueTextEl = document.getElementById('dialogueText');
            const npcAvatarEl = document.getElementById('npcAvatar');
            const dialogueBox = document.getElementById('dialogue-box');
            
            if (npcNameEl) npcNameEl.textContent = name;
            if (npcAvatarEl) npcAvatarEl.textContent = avatar || '👴';
            if (dialogueBox) dialogueBox.style.display = 'block';
            
            // 使用打字机效果
            if (dialogueTextEl) {
                typewriterEffect(dialogueTextEl, text, () => {
                    // 打字完成后的回调
                });
            }
            
            playDialogue();
        };
        
        // 隐藏对话框时停止打字
        window.hideDialogue = function() {
            if (typewriterTimer) {
                clearInterval(typewriterTimer);
                typewriterTimer = null;
            }
            const dialogueBox = document.getElementById('dialogue-box');
            if (dialogueBox) {
                dialogueBox.style.display = 'none';
            }
        };
    </script>
</body>
</html>
