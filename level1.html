<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>探险解谜 - 神秘森林</title>
    <style>
        /* ==================== 色彩方案 ==================== */
        :root {
            /* 主色系 */
            --forest-green: #2D6A4F;
            --forest-green-light: #40916C;
            --magic-purple: #7B2CBF;
            --magic-purple-light: #9D4EDD;
            --gold: #FFD700;
            --gold-light: #FFE066;
            
            /* 背景色系 */
            --bg-darkest: #0D1F0D;
            --bg-dark: #1A3A1A;
            --bg-light: #2D5A2D;
            --card-bg: rgba(20, 40, 20, 0.95);
            
            /* 文字色系 */
            --text-primary: #FFFFFF;
            --text-secondary: #B8E0B8;
            --text-muted: #6B8E6B;
            --text-gold: #FFD700;
            
            /* 透明度 */
            --glass-bg: rgba(13, 31, 13, 0.85);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
            background: var(--bg-darkest);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 900px;
            position: relative;
            background: linear-gradient(180deg, var(--bg-darkest) 0%, var(--bg-dark) 50%, var(--bg-light) 100%);
            overflow: hidden;
        }

        /* ==================== 游戏画布 ==================== */
        #game-canvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 8px;
            /* 写实木框边框 */
            box-shadow: 
                0 0 0 4px #5D4037,
                0 0 0 6px #3E2723,
                0 8px 30px rgba(0,0,0,0.6);
        }

        /* ==================== 顶部状态栏 ==================== */
        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            padding: 12px 16px;
            background: linear-gradient(180deg, var(--glass-bg) 0%, transparent 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-bottom: 1px solid rgba(64, 145, 108, 0.2);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }

        .status-item .icon { 
            font-size: 20px;
            filter: drop-shadow(0 0 4px rgba(255, 215, 0, 0.5));
        }
        
        .status-item .value { 
            color: var(--gold);
            font-family: 'SF Mono', monospace;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            transition: transform 0.2s;
        }
        
        .status-item .value.bump {
            animation: countBump 0.3s ease;
        }

        @keyframes countBump {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        #playerName {
            color: var(--text-secondary);
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { text-shadow: 0 0 5px rgba(184, 224, 184, 0.3); }
            50% { text-shadow: 0 0 15px rgba(184, 224, 184, 0.6); }
        }

        /* 退出按钮 */
        #exit-btn {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        #exit-btn:hover { 
            background: rgba(255, 215, 0, 0.15); 
            color: var(--gold);
            border-color: rgba(255, 215, 0, 0.3);
        }

        /* ==================== 虚拟摇杆 ==================== */
        #joystick-area {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 120px;
            height: 120px;
            /* 木质/树皮纹理边框 */
            background: radial-gradient(circle, rgba(45, 106, 79, 0.5) 0%, rgba(45, 106, 79, 0.2) 100%);
            border: 3px solid rgba(255, 215, 0, 0.25);
            border-radius: 50%;
            z-index: 50;
            touch-action: none;
            box-shadow: 
                0 0 20px rgba(45, 106, 79, 0.4),
                inset 0 0 30px rgba(0, 0, 0, 0.3);
            animation: joystickPulse 2s ease-in-out infinite;
        }

        @keyframes joystickPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(45, 106, 79, 0.4), inset 0 0 30px rgba(0, 0, 0, 0.3); }
            50% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.3), inset 0 0 30px rgba(0, 0, 0, 0.3); }
        }

        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            /* 魔法符文风格 */
            background: radial-gradient(circle, #40916C 0%, #2D6A4F 100%);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 
                0 0 20px rgba(255, 215, 0, 0.4),
                0 4px 15px rgba(0, 0, 0, 0.4);
            transition: transform 0.1s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--gold);
        }

        #joystick-knob::after {
            content: '✦';
            text-shadow: 0 0 10px var(--gold);
        }

        #joystick-knob:active, #joystick-knob.active {
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 
                0 0 40px rgba(255, 215, 0, 0.6),
                0 0 60px rgba(123, 44, 191, 0.4);
        }

        /* ==================== 背包按钮 ==================== */
        #inventory-btn {
            position: absolute;
            bottom: 40px;
            right: 20px;
            width: 56px;
            height: 56px;
            /* 森林绿渐变 */
            background: linear-gradient(135deg, #40916C 0%, #2D6A4F 100%);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            color: #fff;
            cursor: pointer;
            z-index: 50;
            border: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 4px 20px rgba(45, 106, 79, 0.5);
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }

        #inventory-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(255, 215, 0, 0.4);
            border-color: var(--gold);
        }

        #inventory-btn:active {
            transform: scale(0.95);
        }

        /* ==================== 对话框 ==================== */
        #dialogue-box {
            position: absolute;
            bottom: 120px;
            left: 16px;
            right: 16px;
            /* 森林主题深绿渐变 */
            background: linear-gradient(180deg, rgba(20, 50, 20, 0.98) 0%, rgba(10, 30, 10, 0.98) 100%);
            border-radius: 16px;
            padding: 20px;
            color: var(--text-primary);
            font-size: 15px;
            display: none;
            z-index: 80;
            border: 2px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(45, 106, 79, 0.2);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        #dialogue-box .npc-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--gold) 0%, #FFA500 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin-bottom: 12px;
            border: 2px solid var(--gold);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
            float: left;
            margin-right: 12px;
        }

        #dialogue-box .npc-name {
            color: var(--gold);
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            overflow: hidden;
            clear: both;
        }

        #dialogue-box .dialogue-text {
            line-height: 1.7;
            margin-bottom: 12px;
            min-height: 44px;
            color: var(--text-primary);
        }

        #dialogue-box .continue {
            text-align: right;
            color: var(--text-muted);
            font-size: 12px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* ==================== 背包界面 ==================== */
        #inventory-modal {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #inventory-modal.show { display: flex; }

        #inventory-content {
            /* 木质/皮革纹理边框 */
            background: linear-gradient(135deg, #1A3A1A 0%, #0D1F0D 100%);
            border-radius: 20px;
            padding: 24px;
            width: 85%;
            max-width: 340px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 30px rgba(45, 106, 79, 0.2);
        }

        #inventory-content h3 {
            color: var(--gold);
            text-align: center;
            font-size: 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #inventory-content h3::before,
        #inventory-content h3::after {
            content: '✦';
            font-size: 12px;
            opacity: 0.7;
        }

        .inventory-slots {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .inv-slot {
            aspect-ratio: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            transition: all 0.2s;
        }

        .inv-slot.has-item {
            background: rgba(255, 215, 0, 0.1);
            border: 2px solid var(--gold);
            animation: itemShine 2s infinite;
        }

        @keyframes itemShine {
            0%, 100% { box-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
            50% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
        }

        #close-inv {
            display: block;
            margin: 24px auto 0;
            background: linear-gradient(135deg, #40916C 0%, #2D6A4F 100%);
            color: #fff;
            border: 1px solid rgba(255, 215, 0, 0.3);
            padding: 12px 32px;
            border-radius: 24px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        #close-inv:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            border-color: var(--gold);
        }

        /* ==================== 提示 ==================== */
        #tip {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(13, 31, 13, 0.95);
            color: var(--gold);
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            display: none;
            z-index: 150;
            text-align: center;
            border: 2px solid var(--gold);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            animation: tipPop 0.3s;
        }

        @keyframes tipPop {
            from { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        /* ==================== 通关画面 ==================== */
        #victory-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, rgba(26, 58, 26, 0.98) 0%, rgba(13, 31, 13, 0.98) 100%);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 300;
            animation: victoryFade 0.5s;
        }

        @keyframes victoryFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #victory-screen.show { display: flex; }

        #victory-screen .trophy {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 1s infinite;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.5));
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        #victory-screen h1 {
            color: var(--gold);
            font-size: 28px;
            margin-bottom: 12px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        #victory-screen .subtitle {
            color: var(--text-secondary);
            font-size: 16px;
            margin-bottom: 40px;
        }

        #victory-screen .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
        }

        #victory-screen .stat {
            text-align: center;
        }

        #victory-screen .stat-value {
            font-size: 32px;
            color: var(--gold);
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        #victory-screen .stat-label {
            font-size: 12px;
            color: var(--text-muted);
        }

        #victory-screen button {
            background: linear-gradient(135deg, #40916C 0%, #2D6A4F 100%);
            color: #fff;
            border: 2px solid rgba(255, 215, 0, 0.3);
            padding: 14px 48px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(45, 106, 79, 0.5);
            transition: all 0.2s;
        }

        #victory-screen button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.4);
            border-color: var(--gold);
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- 顶部状态栏 -->
        <div id="top-bar">
            <div class="status-item">
                <span class="icon">🍃</span>
                <span id="playerName">冒险家</span>
            </div>
            <div class="status-item">
                <span class="icon">💎</span>
                <span class="value"><span id="fragmentCount">0</span>/3</span>
            </div>
            <button id="exit-btn" onclick="exitGame()">退出</button>
        </div>
        
        <canvas id="game-canvas"></canvas>
        
        <!-- 虚拟摇杆 -->
        <div id="joystick-area">
            <div id="joystick-knob"></div>
        </div>
        
        <!-- 背包按钮 -->
        <div id="inventory-btn" onclick="showInventory()">✦</div>
        
        <!-- 对话框 -->
        <div id="dialogue-box">
            <div class="npc-avatar" id="npcAvatar">👴</div>
            <div class="npc-name" id="npcName"></div>
            <div class="dialogue-text" id="dialogueText"></div>
            <div class="continue">点击继续 ▾</div>
        </div>
        
        <!-- 背包弹窗 -->
        <div id="inventory-modal" onclick="hideInventory()">
            <div id="inventory-content" onclick="event.stopPropagation()">
                <h3>🎒 背包</h3>
                <div class="inventory-slots" id="invSlots">
                    <div class="inv-slot"></div>
                    <div class="inv-slot"></div>
                    <div class="inv-slot"></div>
                    <div class="inv-slot"></div>
                    <div class="inv-slot"></div>
                    <div class="inv-slot"></div>
                </div>
                <button id="close-inv" onclick="hideInventory()">关闭</button>
            </div>
        </div>
        
        <!-- 提示 -->
        <div id="tip"></div>
        
        <!-- 通关画面 -->
        <div id="victory-screen">
            <div class="trophy">🏆</div>
            <h1>🎉 通关成功！</h1>
            <p class="subtitle">恭喜你离开了神秘森林！</p>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value">3</div>
                    <div class="stat-label">收集碎片</div>
                </div>
                <div class="stat">
                    <div class="stat-value">1</div>
                    <div class="stat-label">对话NPC</div>
                </div>
            </div>
            <button onclick="restartGame()">再玩一次</button>
        </div>
    </div>

    <script src="./assets/scripts/level1-game.js"></script>
</body>
</html>
